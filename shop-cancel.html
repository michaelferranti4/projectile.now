<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Canceled</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-black text-zinc-100 flex items-center justify-center px-4">
  <main class="w-full max-w-xl rounded-3xl border border-zinc-800 bg-zinc-900 p-8 text-center shadow-2xl">

    <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
      <a href="shop.html" class="rounded-xl bg-red-600 px-5 py-3 text-sm font-semibold text-white hover:bg-red-500">Return to store</a>
      <a href="index.html" class="rounded-xl border border-zinc-700 px-5 py-3 text-sm hover:bg-zinc-800">Return home</a>
    </div>
  </main>

</html>
